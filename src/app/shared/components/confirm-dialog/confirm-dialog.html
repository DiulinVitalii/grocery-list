<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p class="m-0">{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton type="button" (click)="onCancel()">
    {{ data.cancelLabel ?? 'Cancel' }}
  </button>
  <button matButton="filled" type="button" cdkFocusInitial (click)="onConfirm()">
    {{ data.confirmLabel ?? 'Confirm' }}
  </button>
</mat-dialog-actions>
